name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 isort

      - name: Run flake8
        run: flake8 src/ --max-line-length=120 --ignore=E501,W503

      - name: Check import ordering
        run: isort --check-only --diff src/

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t motor-risk-app:test .

      - name: Verify API starts
        run: |
          docker run -d --name test-api \
            -p 8000:8000 \
            -e MODEL_PATH=/app/models/random_forest.pkl \
            motor-risk-app:test \
            uvicorn src.api.main:app --host 0.0.0.0 --port 8000

          # Wait for API to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/docs > /dev/null 2>&1; then
              echo "API is ready!"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done

          # Smoke test
          curl -sf http://localhost:8000/docs || (docker logs test-api && exit 1)

      - name: Test prediction endpoint
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"voltage": 400.0, "current": 15.0, "temperature": 60.0, "vibration": 5.0}')

          echo "Response: $RESPONSE"

          # Verify response contains "risk" field
          echo "$RESPONSE" | python -c "import sys, json; data = json.load(sys.stdin); assert 'risk' in data, 'Missing risk field'"
          echo "Prediction endpoint OK!"

      - name: Cleanup
        if: always()
        run: docker rm -f test-api || true
