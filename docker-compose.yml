services:
  api:
    image: motor-risk-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: motor-risk-api
    
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models/random_forest.pkl
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  dashboard:
    image: motor-risk-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: motor-risk-dashboard
   
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000  
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models/random_forest.pkl
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped